<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3Dバーチャル・アクアリウム</title>
    <!-- Tailwind CSS (UI用) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- OrbitControls (カメラ操作用) -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            user-select: none;
            background-color: #020617;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
    </style>
</head>
<body>

    <!-- 3D表示領域 -->
    <div id="canvas-container"></div>

    <!-- 復帰用ボタン (UI非表示モードの時だけ右上に表示される) -->
    <button id="show-ui-btn" class="hidden fixed top-4 right-4 z-30 bg-slate-900/80 hover:bg-slate-800 text-cyan-400 p-3 rounded-full border border-cyan-500/30 shadow-2xl transition duration-200 pointer-events-auto" title="UIを表示する">
        <i data-lucide="eye" class="w-6 h-6"></i>
    </button>

    <!-- UIオーバーレイ -->
    <div id="ui-container" class="absolute inset-0 z-10 pointer-events-none flex flex-col justify-between p-4 md:p-6 transition-all duration-500 opacity-100">
        <!-- ヘッダー -->
        <header class="flex justify-between items-start pointer-events-auto w-full">
            <div class="bg-slate-900/80 backdrop-blur-md p-4 rounded-2xl border border-slate-700/50 shadow-2xl max-w-xs md:max-w-md">
                <h1 class="text-xl md:text-2xl font-bold text-cyan-400 flex items-center gap-2">
                    <i data-lucide="waves" class="animate-pulse"></i>
                    3D AQUARIUM
                </h1>
                <p class="text-xs text-slate-400 mt-1">Three.jsで描くインタラクティブな水槽デモ</p>
            </div>

            <div class="flex items-center gap-3">
                <!-- 操作説明 (PCのみ) -->
                <div class="hidden sm:flex bg-slate-900/80 backdrop-blur-md px-4 py-2.5 rounded-full border border-slate-700/50 text-xs text-slate-300 items-center gap-3">
                    <span class="flex items-center gap-1"><i data-lucide="mouse-pointer" class="w-4 h-4 text-cyan-400"></i> ドラッグ: 回転</span>
                    <span class="text-slate-600">|</span>
                    <span class="flex items-center gap-1"><i data-lucide="move" class="w-4 h-4 text-cyan-400"></i> スクロール: ズーム</span>
                </div>

                <!-- 観賞モード (UI非表示) ボタン -->
                <button id="hide-ui-btn" class="bg-slate-900/80 hover:bg-slate-800 text-slate-300 hover:text-cyan-400 p-3 rounded-2xl border border-slate-700/50 shadow-2xl transition duration-200" title="観賞モード（UI非表示）">
                    <i data-lucide="eye-off" class="w-5 h-5"></i>
                </button>
            </div>
        </header>

        <!-- メッセージ通知 (一時表示用) -->
        <div id="toast" class="self-center bg-cyan-500/90 text-slate-950 px-4 py-2 rounded-full font-bold text-sm shadow-lg border border-cyan-300/30 transition-all duration-300 opacity-0 transform translate-y-4 pointer-events-none">
            エサを撒きました！
        </div>

        <!-- コントロールパネル -->
        <footer class="w-full max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-4 pointer-events-auto">
            <!-- 魚のコントロール -->
            <div class="bg-slate-900/80 backdrop-blur-md p-4 rounded-2xl border border-slate-700/50 flex flex-col gap-3">
                <h2 class="text-sm font-semibold text-slate-300 flex items-center gap-1.5">
                    <i data-lucide="settings" class="w-4 h-4 text-cyan-400"></i>
                    シミュレーション
                </h2>
                <div class="grid grid-cols-2 gap-2">
                    <button id="add-fish" class="bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-white font-medium py-2 px-3 rounded-xl transition duration-200 flex items-center justify-center gap-1.5 shadow-lg shadow-cyan-950/50 text-sm">
                        <i data-lucide="plus-circle" class="w-4 h-4"></i> 魚を追加
                    </button>
                    <button id="feed" class="bg-gradient-to-r from-amber-500 to-orange-600 hover:from-amber-400 hover:to-orange-500 text-white font-medium py-2 px-3 rounded-xl transition duration-200 flex items-center justify-center gap-1.5 shadow-lg shadow-orange-950/50 text-sm">
                        <i data-lucide="soup" class="w-4 h-4"></i> エサをあげる
                    </button>
                </div>
                <div class="flex justify-between text-xs text-slate-400 mt-1 px-1">
                    <span>魚の数: <span id="fish-count" class="text-cyan-400 font-bold">0</span> 匹</span>
                    <span>エサの数: <span id="food-count" class="text-amber-400 font-bold">0</span> 個</span>
                </div>
            </div>

            <!-- テーマ切り替え -->
            <div class="bg-slate-900/80 backdrop-blur-md p-4 rounded-2xl border border-slate-700/50 flex flex-col gap-2.5">
                <h2 class="text-sm font-semibold text-slate-300 flex items-center gap-1.5">
                    <i data-lucide="palette" class="w-4 h-4 text-cyan-400"></i>
                    水槽の環境
                </h2>
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="setTheme('day')" class="theme-btn active bg-slate-800 text-cyan-400 hover:bg-slate-750 border border-cyan-500/30 font-medium py-1.5 px-2 rounded-xl text-xs transition duration-200">
                        お昼
                    </button>
                    <button onclick="setTheme('night')" class="theme-btn bg-slate-800/50 text-slate-400 hover:bg-slate-800 border border-transparent font-medium py-1.5 px-2 rounded-xl text-xs transition duration-200">
                        夜間
                    </button>
                    <button onclick="setTheme('abyss')" class="theme-btn bg-slate-800/50 text-slate-400 hover:bg-slate-800 border border-transparent font-medium py-1.5 px-2 rounded-xl text-xs transition duration-200">
                        深海
                    </button>
                </div>
            </div>

            <!-- ステータス/ヒント -->
            <div class="bg-slate-900/80 backdrop-blur-md p-4 rounded-2xl border border-slate-700/50 flex flex-col justify-between">
                <div>
                    <h2 class="text-xs font-bold text-slate-400 tracking-wider uppercase mb-1">TIPS / ヒント</h2>
                    <p class="text-xs text-slate-300 leading-relaxed">
                        エサをあげると、魚たちがエサに群がります。右上のボタンでUIを隠して、美しい水槽をじっくり眺めることもできます。
                    </p>
                </div>
                <div class="text-[10px] text-slate-500 text-right mt-2">
                    Powered by Three.js
                </div>
            </div>
        </footer>
    </div>

    <!-- メイン処理 -->
    <script>
        // --- 定数 & 設定 ---
        const TANK_WIDTH = 30;
        const TANK_HEIGHT = 16;
        const TANK_DEPTH = 18;

        const FISH_COLORS = [
            0xff5733, // オレンジ・レッド
            0xffbd33, // イエローゴールド
            0x33ff57, // ネオングリーン
            0x3357ff, // コバルトブルー
            0xf333ff, // マゼンタ
            0x33fff0  // シアン
        ];

        // --- グローバル変数 ---
        let scene, camera, renderer, controls;
        let fishes = [];
        let foods = [];
        let bubbleSystem;
        let lightRays = [];
        let topLight, ambientLight;

        // --- 初期化 ---
        window.onload = function() {
            lucide.createIcons();
            init3D();
            initEnvironment();
            initBubbles();
            
            // 初期の魚たちを生成
            for (let i = 0; i < 12; i++) {
                spawnFish();
            }

            // イベントリスナーの登録
            document.getElementById('add-fish').addEventListener('click', () => {
                spawnFish();
                showToast("新しい魚が加わりました！");
            });

            document.getElementById('feed').addEventListener('click', () => {
                spawnFood();
            });

            // UIの表示・非表示コントロール
            const uiContainer = document.getElementById('ui-container');
            const hideUiBtn = document.getElementById('hide-ui-btn');
            const showUiBtn = document.getElementById('show-ui-btn');

            hideUiBtn.addEventListener('click', () => toggleUI(false));
            showUiBtn.addEventListener('click', () => toggleUI(true));

            // キーボードの Esc キーでも UI を復帰できるようにする
            window.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    toggleUI(true);
                }
            });

            // アニメーションループ開始
            animate();
        };

        // UI表示のトグル処理
        function toggleUI(show) {
            const uiContainer = document.getElementById('ui-container');
            const showUiBtn = document.getElementById('show-ui-btn');

            if (show) {
                uiContainer.classList.remove('opacity-0', 'pointer-events-none');
                uiContainer.classList.add('opacity-100');
                showUiBtn.classList.add('hidden');
            } else {
                uiContainer.classList.remove('opacity-100');
                uiContainer.classList.add('opacity-0', 'pointer-events-none');
                showUiBtn.classList.remove('hidden');
                showToast("観賞モードに入りました。EscキーでUIを戻せます。");
            }
        }

        // --- Three.js 基本設定 ---
        function init3D() {
            const container = document.getElementById('canvas-container');
            
            // シーン
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x011125);
            scene.fog = new THREE.FogExp2(0x011125, 0.025);

            // カメラ
            camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(0, 5, 25);

            // レンダラー
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            // カメラコントロール
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2 - 0.01; // 地面の下に行かないように制限
            controls.minDistance = 5;
            controls.maxDistance = 40;

            // リサイズ対応
            window.addEventListener('resize', onWindowResize);
        }

        // --- ライティングと環境 ---
        function initEnvironment() {
            // 環境光 (水全体のぼんやりとした色合い)
            ambientLight = new THREE.AmbientLight(0x0a2240, 1.5);
            scene.add(ambientLight);

            // 天井光 (水面からの光)
            topLight = new THREE.SpotLight(0xffffff, 5);
            topLight.position.set(0, TANK_HEIGHT, 0);
            topLight.angle = Math.PI / 3;
            topLight.penumbra = 0.8;
            topLight.castShadow = true;
            topLight.shadow.mapSize.width = 1024;
            topLight.shadow.mapSize.height = 1024;
            scene.add(topLight);

            // 水槽の外枠（ワイヤーフレームでうっすら表示）
            const tankGeo = new THREE.BoxGeometry(TANK_WIDTH, TANK_HEIGHT, TANK_DEPTH);
            const edgeGeo = new THREE.EdgesGeometry(tankGeo);
            const edgeMat = new THREE.LineBasicMaterial({ color: 0x0ea5e9, transparent: true, opacity: 0.15 });
            const wireframe = new THREE.LineSegments(edgeGeo, edgeMat);
            scene.add(wireframe);

            // 底砂（少しだけ凹凸のある砂底を表現）
            const floorGeo = new THREE.PlaneGeometry(TANK_WIDTH, TANK_DEPTH, 24, 24);
            const pos = floorGeo.attributes.position;
            for (let i = 0; i < pos.count; i++) {
                const vx = pos.getX(i);
                const vy = pos.getY(i);
                const z = Math.sin(vx * 0.3) * Math.cos(vy * 0.3) * 0.2 + Math.sin(vx * 0.1) * 0.1;
                pos.setZ(i, z);
            }
            floorGeo.computeVertexNormals();

            const floorMat = new THREE.MeshStandardMaterial({
                color: 0x051b30,
                roughness: 0.9,
                metalness: 0.1,
                flatShading: true
            });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.position.y = -TANK_HEIGHT / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            // 水光の差し込み（光彩を表現するコーン）
            const rayGeo = new THREE.ConeGeometry(8, TANK_HEIGHT, 4, 1, true);
            const rayMat = new THREE.MeshBasicMaterial({
                color: 0x0ea5e9,
                transparent: true,
                opacity: 0.05,
                side: THREE.DoubleSide,
                depthWrite: false
            });
            
            for(let i = 0; i < 3; i++) {
                const ray = new THREE.Mesh(rayGeo, rayMat);
                ray.position.set((Math.random() - 0.5) * 15, 0, (Math.random() - 0.5) * 10);
                ray.rotation.x = (Math.random() - 0.5) * 0.2;
                ray.rotation.z = (Math.random() - 0.5) * 0.2;
                scene.add(ray);
                lightRays.push(ray);
            }
        }

        // --- 泡（パーティクル）の生成 ---
        function initBubbles() {
            const bubbleCount = 120;
            const geom = new THREE.BufferGeometry();
            const positions = [];
            const speeds = [];

            for (let i = 0; i < bubbleCount; i++) {
                positions.push(
                    (Math.random() - 0.5) * (TANK_WIDTH - 2),
                    (Math.random() - 0.5) * TANK_HEIGHT,
                    (Math.random() - 0.5) * (TANK_DEPTH - 2)
                );
                speeds.push(0.02 + Math.random() * 0.04);
            }

            geom.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            
            const mat = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 0.15,
                transparent: true,
                opacity: 0.4,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            bubbleSystem = new THREE.Points(geom, mat);
            bubbleSystem.userData = { speeds: speeds };
            scene.add(bubbleSystem);
        }

        // --- 魚の生成クラス ---
        class Fish {
            constructor(color, scale = 1) {
                this.color = color;
                this.scale = scale * (0.8 + Math.random() * 0.4);
                
                // メッシュグループの作成
                this.group = new THREE.Group();

                // 魚の体
                const bodyGeo = new THREE.SphereGeometry(0.6, 16, 8);
                bodyGeo.scale(1.8, 1, 0.5); // 魚っぽく前後に長く、左右に薄く
                const bodyMat = new THREE.MeshStandardMaterial({
                    color: this.color,
                    roughness: 0.3,
                    metalness: 0.1,
                    flatShading: true
                });
                const body = new THREE.Mesh(bodyGeo, bodyMat);
                body.castShadow = true;
                this.group.add(body);

                // 尾ひれ用のジョイント（ここに尾ひれをくっつけて左右に振る）
                this.tailJoint = new THREE.Group();
                this.tailJoint.position.set(-1.0, 0, 0); // 体の後方（負のX方向）に配置
                this.group.add(this.tailJoint);

                // 尾ひれ (コーン) の作成
                const tailGeo = new THREE.ConeGeometry(0.4, 0.8, 4);
                
                // 【修正箇所】
                // コーンの頂点(前)が体方向(+X)、底面(後ろ)が外側(-X)を向くように時計回りと逆方向に回転。
                // これにより、先端がジョイント部になり、後ろに行くほど扇状に広がる正しい形になります。
                tailGeo.rotateZ(-Math.PI / 2); 
                tailGeo.scale(1, 0.2, 1.5); // 上下に広く、厚みを平べったく変形

                const tailMat = new THREE.MeshStandardMaterial({
                    color: this.color,
                    roughness: 0.4,
                    flatShading: true
                });
                const tail = new THREE.Mesh(tailGeo, tailMat);
                
                // 接合部が自然に見えるように位置調整
                tail.position.set(-0.4, 0, 0); 
                tail.castShadow = true;
                this.tailJoint.add(tail);

                // 目 (左右に2つ)
                const eyeGeo = new THREE.SphereGeometry(0.12, 8, 8);
                const eyeMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
                
                const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
                leftEye.position.set(0.6, 0.2, 0.3);
                this.group.add(leftEye);

                const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
                rightEye.position.set(0.6, 0.2, -0.3);
                this.group.add(rightEye);

                // 補正スケール
                this.group.scale.set(this.scale, this.scale, this.scale);

                // 初期位置と運動パラメータ
                this.group.position.set(
                    (Math.random() - 0.5) * (TANK_WIDTH - 4),
                    (Math.random() - 0.5) * (TANK_HEIGHT - 4),
                    (Math.random() - 0.5) * (TANK_DEPTH - 4)
                );

                this.velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 0.08,
                    (Math.random() - 0.5) * 0.04,
                    (Math.random() - 0.5) * 0.08
                );

                this.speedLimit = 0.06 + Math.random() * 0.04;
                this.wiggleSpeed = 10 + Math.random() * 8;
                this.wigglePhase = Math.random() * Math.PI * 2;
                
                scene.add(this.group);
            }

            update(time) {
                // 自律スイミング＆境界回避
                this.boundaryAvoidance();

                // エサを追う
                this.seekFood();

                // 速度制限
                this.velocity.clampLength(0, this.speedLimit);

                // 位置の更新
                this.group.position.add(this.velocity);

                // 進行方向を向く
                if (this.velocity.lengthSq() > 0.0001) {
                    const targetRotation = Math.atan2(-this.velocity.z, this.velocity.x);
                    let diff = targetRotation - this.group.rotation.y;
                    
                    while (diff < -Math.PI) diff += Math.PI * 2;
                    while (diff > Math.PI) diff -= Math.PI * 2;
                    
                    this.group.rotation.y += diff * 0.08;

                    const pitch = this.velocity.y * 5;
                    this.group.rotation.z += (pitch - this.group.rotation.z) * 0.1;
                }

                // 尾ひれのパタパタ
                const wiggle = Math.sin(time * this.wiggleSpeed + this.wigglePhase) * 0.5;
                this.tailJoint.rotation.y = wiggle;
            }

            boundaryAvoidance() {
                const boundX = TANK_WIDTH / 2 - 2;
                const boundY = TANK_HEIGHT / 2 - 1.5;
                const boundZ = TANK_DEPTH / 2 - 2;
                const force = 0.005;

                if (this.group.position.x > boundX) this.velocity.x -= force;
                if (this.group.position.x < -boundX) this.velocity.x += force;
                
                if (this.group.position.y > boundY) this.velocity.y -= force;
                if (this.group.position.y < -boundY) this.velocity.y += force;
                
                if (this.group.position.z > boundZ) this.velocity.z -= force;
                if (this.group.position.z < -boundZ) this.velocity.z += force;

                this.velocity.x += (Math.random() - 0.5) * 0.002;
                this.velocity.y += (Math.random() - 0.5) * 0.001;
                this.velocity.z += (Math.random() - 0.5) * 0.002;
            }

            seekFood() {
                if (foods.length === 0) return;

                let closestFood = null;
                let minDist = 999;

                for (let i = 0; i < foods.length; i++) {
                    const dist = this.group.position.distanceTo(foods[i].mesh.position);
                    if (dist < minDist) {
                        minDist = dist;
                        closestFood = foods[i];
                    }
                }

                if (closestFood && minDist < 15) {
                    const dir = new THREE.Vector3().subVectors(closestFood.mesh.position, this.group.position);
                    dir.normalize();
                    this.velocity.addScaledVector(dir, 0.008);

                    if (minDist < 1.0) {
                        closestFood.destroy();
                        this.speedLimit = 0.15;
                        setTimeout(() => {
                            this.speedLimit = 0.06 + Math.random() * 0.04;
                        }, 1000);
                    }
                }
            }

            destroy() {
                scene.remove(this.group);
            }
        }

        function spawnFish() {
            const randomColor = FISH_COLORS[Math.floor(Math.random() * FISH_COLORS.length)];
            const fish = new Fish(randomColor);
            fishes.push(fish);
            updateStatus();
        }

        // --- エサのクラス ---
        class Food {
            constructor(x, z) {
                this.isAlive = true;
                const geo = new THREE.SphereGeometry(0.18, 6, 6);
                const mat = new THREE.MeshStandardMaterial({
                    color: 0xd97706,
                    roughness: 0.9
                });
                this.mesh = new THREE.Mesh(geo, mat);
                this.mesh.position.set(x, TANK_HEIGHT / 2 - 0.5, z);
                scene.add(this.mesh);

                this.fallSpeed = 0.015 + Math.random() * 0.01;
            }

            update() {
                if (!this.isAlive) return;

                this.mesh.position.y -= this.fallSpeed;
                
                if (this.mesh.position.y <= -TANK_HEIGHT / 2 + 0.2) {
                    this.destroy();
                }
            }

            destroy() {
                if (!this.isAlive) return;
                this.isAlive = false;
                scene.remove(this.mesh);
                foods = foods.filter(f => f !== this);
                updateStatus();
            }
        }

        function spawnFood() {
            const count = 3 + Math.floor(Math.random() * 3);
            for (let i = 0; i < count; i++) {
                const rx = (Math.random() - 0.5) * (TANK_WIDTH - 6);
                const rz = (Math.random() - 0.5) * (TANK_DEPTH - 6);
                foods.push(new Food(rx, rz));
            }
            updateStatus();
            // UI非表示モードでなければトーストを表示
            const uiContainer = document.getElementById('ui-container');
            if (uiContainer.classList.contains('opacity-100')) {
                showToast("エサを撒きました！魚が寄ってきます。");
            }
        }

        // --- UI更新・トースト表示 ---
        function updateStatus() {
            document.getElementById('fish-count').innerText = fishes.length;
            document.getElementById('food-count').innerText = foods.length;
        }

        function showToast(text) {
            const toast = document.getElementById('toast');
            toast.innerText = text;
            toast.classList.remove('opacity-0', 'translate-y-4');
            toast.classList.add('opacity-100', 'translate-y-0');

            setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', 'translate-y-4');
            }, 2500);
        }

        // --- テーマ切り替え ---
        function setTheme(mode) {
            const buttons = document.querySelectorAll('.theme-btn');
            buttons.forEach(btn => {
                btn.classList.remove('active', 'border-cyan-500/30', 'text-cyan-400');
                btn.classList.add('bg-slate-800/50', 'text-slate-400', 'border-transparent');
            });

            const event = window.event;
            if (event) {
                const target = event.currentTarget;
                target.classList.add('active', 'border-cyan-500/30', 'text-cyan-400');
                target.classList.remove('bg-slate-800/50', 'text-slate-400', 'border-transparent');
            }

            if (mode === 'day') {
                scene.background.setHex(0x011125);
                scene.fog.color.setHex(0x011125);
                scene.fog.density = 0.025;
                ambientLight.color.setHex(0x0a2240);
                ambientLight.intensity = 1.5;
                topLight.color.setHex(0xffffff);
                topLight.intensity = 5;
                lightRays.forEach(r => r.visible = true);
            } else if (mode === 'night') {
                scene.background.setHex(0x00040a);
                scene.fog.color.setHex(0x00040a);
                scene.fog.density = 0.035;
                ambientLight.color.setHex(0x010815);
                ambientLight.intensity = 0.6;
                topLight.color.setHex(0x4080ff);
                topLight.intensity = 1.8;
                lightRays.forEach(r => r.visible = false);
            } else if (mode === 'abyss') {
                scene.background.setHex(0x000105);
                scene.fog.color.setHex(0x000105);
                scene.fog.density = 0.06;
                ambientLight.color.setHex(0x00020a);
                ambientLight.intensity = 0.2;
                topLight.color.setHex(0x22d3ee);
                topLight.intensity = 3.0;
                lightRays.forEach(r => r.visible = true);
            }
        }

        // --- アニメーションループ ---
        function animate() {
            requestAnimationFrame(animate);

            const time = performance.now() * 0.001;

            controls.update();

            fishes.forEach(fish => {
                fish.update(time);
            });

            for (let i = foods.length - 1; i >= 0; i--) {
                foods[i].update();
            }

            if (bubbleSystem) {
                const posArr = bubbleSystem.geometry.attributes.position.array;
                const speeds = bubbleSystem.userData.speeds;
                
                for (let i = 0; i < speeds.length; i++) {
                    const idxY = i * 3 + 1;
                    posArr[idxY] += speeds[i];

                    if (posArr[idxY] > TANK_HEIGHT / 2) {
                        posArr[idxY] = -TANK_HEIGHT / 2;
                        posArr[i * 3] = (Math.random() - 0.5) * (TANK_WIDTH - 2);
                        posArr[i * 3 + 2] = (Math.random() - 0.5) * (TANK_DEPTH - 2);
                    }
                }
                bubbleSystem.geometry.attributes.position.needsUpdate = true;
            }

            lightRays.forEach((ray, idx) => {
                ray.rotation.y = time * 0.1 * (idx + 1);
                ray.position.x += Math.sin(time + idx) * 0.005;
            });

            renderer.render(scene, camera);
        }

        // --- リサイズ処理 ---
        function onWindowResize() {
            const container = document.getElementById('canvas-container');
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }
    </script>
</body>
</html>
